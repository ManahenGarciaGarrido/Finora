services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: finora-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: finora
      POSTGRES_PASSWORD: finora_secure_password_2024
      POSTGRES_DB: finora_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./finora_backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finora -d finora_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finora-network

  # MailHog - Email testing service (desarrollo/staging)
  # En producción sustituir por un servicio SMTP real (SendGrid, Postmark, etc.)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: finora-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI para ver emails en desarrollo
    networks:
      - finora-network

  # ─────────────────────────────────────────────────────────────────
  # RF-14 / RF-21 / RF-22: Finora AI Service (Python Flask)
  #
  # Motor de categorización automática (RF-14):
  #   - TF-IDF + RandomForest entrenado en descriptores bancarios españoles
  #   - Fallback a motor de reglas si el modelo no está disponible
  #
  # Predicción de gastos ML (RF-22 / HU-09):
  #   - Ridge / RandomForest / GradientBoosting según historial disponible
  #   - Algoritmo basado en Notebooks/rf22_prediccion_gastos_ml.ipynb
  #
  # Recomendaciones de ahorro (RF-21 / HU-08):
  #   - Regla 50/30/20 + capacidad de ahorro disponible
  #   - Algoritmo basado en Notebooks/rf21_hu08_ahorro_inteligente.ipynb
  # ─────────────────────────────────────────────────────────────────
  ai:
    build:
      context: ./finora_ai
      dockerfile: Dockerfile
    container_name: finora-ai
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      PORT: 5001
      # RF-25 / HU-12: Asistente conversacional con Gemini
      # Para activar Gemini, descomenta la línea siguiente y pega tu clave de API.
      # Obtener clave gratis en: https://aistudio.google.com/app/apikey
      # Sin clave → el chat usa el motor de respuestas basado en reglas (sin LLM).
      # GEMINI_API_KEY: "pega_aquí_tu_clave_de_gemini"
    ports:
      - "5001:5001"
    volumes:
      # Volumen persistente para modelos entrenados (RF-14)
      # Los modelos se entrenan al primer arranque si no existen
      - ai_models:/app/models
    networks:
      - finora-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # RF-25: Ollama — Servidor LLM local para el asistente Finn
  #
  # Modelo por defecto: llama3.2:1b  (~1.3 GB, rápido en CPU, buena calidad)
  # En el primer arranque ejecuta: docker exec finora-ollama ollama pull llama3.2:1b
  #
  # Alternativas según RAM disponible en el servidor Azure:
  #   4 GB RAM → llama3.2:1b  (recomendado, equilibrio velocidad/calidad)
  #   8 GB RAM → llama3.2:3b  o phi3.5 (mejor calidad, ~2x más lento en CPU)
  #  GPU (NC6) → llama3.1:8b  (respuestas en <3s, calidad excelente)
  # ─────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: finora-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama   # modelos descargados persisten entre reinicios
    ports:
      - "11434:11434"
    networks:
      - finora-network
    # Healthcheck: verifica que la API de Ollama responde
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ─────────────────────────────────────────────────────────────────
  # Finora Backend API (Node.js + Express)
  #
  # RF-10 / RF-11: Sincronización bancaria con Plaid
  #
  # MODO SANDBOX (desarrollo):
  #   - PLAID_ENV=sandbox → usa sandbox.plaid.com
  #   - Credenciales de prueba: user_good / pass_good
  #   - Registrarse gratis en https://dashboard.plaid.com
  #   - Obtener PLAID_CLIENT_ID y PLAID_SECRET en My Team → Keys
  #
  # MODO PRODUCCIÓN:
  #   - Cambiar PLAID_ENV=production
  #   - Cambiar PLAID_SECRET por el secret de producción de Plaid
  #   - El código es 100% compatible: no requiere ningún otro cambio
  #
  # Sin PLAID_CLIENT_ID configurado → modo mock (datos demo, sin API real)
  # ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./finora_backend
      dockerfile: Dockerfile
    container_name: finora-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
      ai:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000

      # ── Seguridad ─────────────────────────────────────────────────────────
      # CAMBIAR en producción: mínimo 32 caracteres, aleatorio y secreto
      JWT_SECRET: finora-jwt-secret-key-change-in-production-minimum-32-chars

      # ── Base de datos ─────────────────────────────────────────────────────
      DATABASE_URL: postgresql://finora:finora_secure_password_2024@postgres:5432/finora_db

      # ── Email ─────────────────────────────────────────────────────────────
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USER: manahengag@gmail.com
      SMTP_PASS: gkexlmfzilavrekf
      EMAIL_FROM: noreply@finora.com

      # ── URLs ─────────────────────────────────────────────────────────────
      APP_URL: http://192.168.100.88:3000
      FRONTEND_URL: http://localhost:8080
      ALLOWED_ORIGINS: "*"

      # ── RF-14: Servicio de IA (categorización + predicciones + ahorro) ────
      AI_SERVICE_URL: http://ai:5001

      # ── RF-25: Ollama — LLM local para el asistente Finn ─────────────────
      # URL interna de Ollama (servicio en la misma red Docker)
      OLLAMA_URL: http://ollama:11434
      # Modelo a usar. Opciones recomendadas según hardware:
      #   llama3.2:1b  → CPU (≥4 GB RAM) — velocidad: ~10-20 tok/s en CPU
      #   llama3.2:3b  → CPU (≥8 GB RAM) — mejor calidad, más lento
      #   llama3.1:8b  → GPU (NC6)       — calidad alta, ~50+ tok/s
      OLLAMA_MODEL: llama3.2:1b

      # ── RF-10 / RF-11: Plaid — Sincronización bancaria ───────────────────
      #
      # SANDBOX (desarrollo): descomentar y rellenar con tus claves de Plaid
      # Registro gratuito en: https://dashboard.plaid.com
      # My Team → Keys → copiar client_id y sandbox secret
      #
      # PLAID_ENV: sandbox
      # PLAID_CLIENT_ID: your_plaid_client_id_here
      # PLAID_SECRET: your_plaid_sandbox_secret_here
      #
      # PRODUCCIÓN: cambiar PLAID_ENV y PLAID_SECRET únicamente
      # (el CLIENT_ID es el mismo en sandbox y producción)
      #
      # PLAID_ENV: production
      # PLAID_CLIENT_ID: your_plaid_client_id_here
      # PLAID_SECRET: your_plaid_production_secret_here
      #
      # ¿Sin claves de Plaid? El sistema opera en modo MOCK automáticamente:
      # - Las cuentas y transacciones son datos demo
      # - No se realizan llamadas a la API de Plaid
      # - Funcional para demos y pruebas internas
      #
      # Descomenta las tres líneas de abajo para activar el sandbox:
      # PLAID_ENV: sandbox
      # PLAID_CLIENT_ID: ""
      # PLAID_SECRET: ""

    ports:
      - "3000:3000"
    networks:
      - finora-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────────
  # RNF-17: Backup automático de la base de datos
  # Genera pg_dump diario cifrado y lo almacena en el volumen db_backups.
  # Retención de 30 días (elimina backups más antiguos automáticamente).
  # RNF-14: Complementa el 99% de uptime con recuperación ante desastres.
  # ─────────────────────────────────────────────────────────────────
  db-backup:
    image: postgres:15-alpine
    container_name: finora-db-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: finora_secure_password_2024
    volumes:
      - db_backups:/backups
    networks:
      - finora-network
    # Cron: backup diario a las 3:00 AM, retención de 30 días
    command: >
      sh -c "
        while true; do
          BACKUP_FILE=/backups/finora_db_$$(date +%Y%m%d_%H%M%S).sql.gz
          echo \"[RNF-17] Iniciando backup: $$BACKUP_FILE\"
          pg_dump -h postgres -U finora -d finora_db | gzip > $$BACKUP_FILE
          if [ $$? -eq 0 ]; then
            echo \"[RNF-17] Backup completado: $$BACKUP_FILE\"
            # Eliminar backups con más de 30 días (retención)
            find /backups -name 'finora_db_*.sql.gz' -mtime +30 -delete
            echo \"[RNF-17] Limpieza de backups antiguos completada\"
          else
            echo \"[RNF-17] ERROR en backup\"
          fi
          # Esperar 24 horas (86400 segundos)
          sleep 86400
        done
      "
    healthcheck:
      test: ["CMD-SHELL", "ls /backups/*.sql.gz 2>/dev/null | head -1 | xargs -I{} test -f {} && echo ok || echo no_backup_yet"]
      interval: 24h
      timeout: 30s
      retries: 1
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: finora-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - finora-network

  grafana:
    image: grafana/grafana:latest
    container_name: finora-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - finora-network
      
networks:
  finora-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  # Volumen para modelos ML persistentes (RF-14 / RF-22)
  # Se entrenan al primer arranque del servicio finora-ai
  ai_models:
    driver: local
  # RF-25: Modelos LLM de Ollama (~1-4 GB según modelo elegido)
  # Se descargan la primera vez y persisten en este volumen
  ollama_models:
    driver: local
  # RNF-17: Almacenamiento de backups diarios (retención 30 días)
  db_backups:
    driver: local
    
  grafana_data:
    driver: local