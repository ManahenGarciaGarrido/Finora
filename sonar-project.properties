# ─────────────────────────────────────────────────────────────────────────────
# sonar-project.properties  –  Finora Monorepo
# Compatible: SonarQube 9.9 LTS + npx sonarqube-scanner (Windows)
# ─────────────────────────────────────────────────────────────────────────────

# ── Servidor y autenticación ──────────────────────────────────────────────────
sonar.host.url=http://localhost:9000
sonar.login=squ_438e13234fefb140db8cc3b5499cbe2bf4eda9dc

# ── Identificadores ───────────────────────────────────────────────────────────
sonar.projectKey=finora
sonar.projectName=Finora
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# ── Módulos del monorepo ──────────────────────────────────────────────────────
sonar.modules=frontend,backend,ai

# ─── 1. MÓDULO FRONTEND (Flutter/Dart) ───────────────────────────────────────
frontend.sonar.projectName=Finora Frontend
frontend.sonar.projectBaseDir=finora_frontend
frontend.sonar.sources=lib
frontend.sonar.tests=test

# INCLUSIONES: data/ y domain/ son las capas con lógica de negocio testeable
# EXCLUSIONES: presentation/pages y presentation/widgets son pura UI (no se testea)
# NOTA: NO excluir lib/**/data/** ni lib/**/domain/** — son el objetivo del coverage
frontend.sonar.exclusions=\
  **/.dart_tool/**,\
  **/build/**,\
  **/*.g.dart,\
  **/*.freezed.dart,\
  lib/**/presentation/pages/**,\
  lib/**/presentation/widgets/**,\
  lib/shared/widgets/**

# Excluir de cobertura: presentation, main y DI (sin lógica testeable)
frontend.sonar.coverage.exclusions=\
  lib/**/presentation/**,\
  lib/main.dart,\
  lib/**/injection_container.dart,\
  lib/**/*.g.dart,\
  lib/**/*.freezed.dart

# Flutter: MANUAL = usar el reporte lcov generado por `flutter test --coverage`
# scan.ps1 normaliza los separadores de ruta antes de este paso (Regex Gold Rule)
frontend.sonar.dart.analyzer.mode=MANUAL
frontend.sonar.dart.coverage.reportPaths=coverage/lcov.info

# ─── 2. MÓDULO BACKEND (Node.js) ─────────────────────────────────────────────
backend.sonar.projectName=Finora Backend
backend.sonar.projectBaseDir=finora_backend
backend.sonar.sources=.
backend.sonar.exclusions=**/node_modules/**, __tests__/**, coverage/**
backend.sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ─── 3. MÓDULO IA (Python) ───────────────────────────────────────────────────
ai.sonar.projectName=Finora AI
ai.sonar.projectBaseDir=finora_ai
ai.sonar.sources=.
# .venv/** es crítico excluirlo: contiene miles de archivos de terceros
ai.sonar.exclusions=.venv/**, models/**, notebooks/**, tests/**, **/__pycache__/**, **/*.pyc, coverage.xml
ai.sonar.python.coverage.reportPaths=coverage.xml
ai.sonar.python.version=3.11