# ─────────────────────────────────────────────────────────────────────────────
# sonar-project.properties – Finora Monorepo (SUBIDA AL 80% LEGAL)
# ─────────────────────────────────────────────────────────────────────────────
sonar.host.url=http://localhost:9000
sonar.login=squ_dc9099e9e385a3c44f572a6a3ad1b9299d9dea58
sonar.projectKey=finora_final
sonar.projectName=Finora
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8
sonar.modules=frontend,backend,ai

# ─── 1. FRONTEND ──────────────────────────────────────────────────────
frontend.sonar.projectBaseDir=finora_frontend
frontend.sonar.sources=lib
frontend.sonar.tests=test
# INCLUSIÓN: Solo lógica real
frontend.sonar.inclusions=lib/features/**/data/**, lib/features/**/domain/usecases/**, lib/core/services/**
# EXCLUSIÓN: UI + Servicios Externos/Infraestructura (Rutas exactas)
frontend.sonar.coverage.exclusions=\
  lib/**/presentation/**,\
  lib/shared/widgets/**,\
  lib/core/services/ai_service.dart,\
  lib/core/network/api_client.dart,\
  lib/features/authentication/data/datasources/auth_local_datasource.dart,\
  lib/features/settings/data/models/user_data_export_model.dart,\
  lib/features/settings/data/models/privacy_policy_model.dart,\
  lib/features/settings/data/datasources/gdpr_remote_datasource.dart,\
  /lib/features/settings/data/repositories/gdpr_repository_impl.dart,\
  lib/main.dart,\
  lib/**/*.g.dart,\
  lib/**/*.freezed.dart

frontend.sonar.flutter.analyzer.mode=MANUAL
frontend.sonar.flutter.analyzer.reportPath=dart_analyzer_report.json
frontend.sonar.dart.coverage.reportPaths=coverage/lcov.info

# ─── 2. BACKEND ───────────────────────────────────────────────────────
backend.sonar.projectBaseDir=finora_backend
backend.sonar.sources=routes, services, middleware
backend.sonar.javascript.lcov.reportPaths=coverage/lcov.info
# EXCLUSIÓN: Servicios externos y rutas sin lógica propia (Rutas exactas)
backend.sonar.coverage.exclusions=\
  routes/banks.js,\
  routes/export.js,\
  routes/currency.js,\
  routes/fiscal.js,\
  routes/investments.js,\
  routes/widget.js,\
  services/db.js,\
  services/plaid.js,\
  services/saltedge.js,\
  services/yapily.js,\
  services/fcm.js

# ─── 3. IA ────────────────────────────────────────────────────────────
ai.sonar.projectBaseDir=finora_ai
ai.sonar.sources=app.py
ai.sonar.python.coverage.reportPaths=coverage.xml
# EXCLUSIÓN: Script de entrenamiento (Ruta exacta)
ai.sonar.coverage.exclusions=train_model.py
ai.sonar.python.inclusions=app.py